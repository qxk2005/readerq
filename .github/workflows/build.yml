name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node -e "const fs=require('fs');const v=process.env.GITHUB_REF.replace('refs/tags/v','');console.log('Syncing version to',v);const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version=v;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Build Electron App
        run: npm run build && node scripts/build-electron.js && npx electron-builder --publish never && node scripts/post-build.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List dist contents
        shell: bash
        run: ls -lhR dist/ || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReaderQ-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"* %s (%h)" > CHANGELOG.md
          else
            git log --pretty=format:"* %s (%h)" $PREVIOUS_TAG..HEAD > CHANGELOG.md
          fi
          echo "" >> CHANGELOG.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ github.ref_name }}" >> CHANGELOG.md

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: CHANGELOG.md
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android APK and AAB
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug bundleRelease

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReaderQ-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReaderQ-Android-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Release Android
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab
